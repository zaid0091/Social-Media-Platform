<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | SocialApp</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #09090b;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      padding: 2rem;
      max-width: 400px;
    }
    .icon {
      font-size: 4.5rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s infinite;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 900;
      margin-bottom: 0.75rem;
      color: #f4f4f5;
      letter-spacing: -0.025em;
    }
    p {
      font-size: 0.875rem;
      color: #a1a1aa;
      margin-bottom: 2.25rem;
      line-height: 1.6;
      font-weight: 500;
    }
    button {
      background-color: #7c3aed;
      color: white;
      border: none;
      padding: 0.85rem 1.75rem;
      font-size: 0.875rem;
      font-weight: 800;
      border-radius: 1.25rem;
      cursor: pointer;
      box-shadow: 0 4px 14px -2px rgba(124, 58, 237, 0.35);
      transition: all 0.2s ease-in-out;
    }
    button:hover {
      background-color: #6d28d9;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px -2px rgba(124, 58, 237, 0.45);
    }
    button:active {
      transform: translateY(0);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Connection Lost</h1>
    <p>You are currently offline. Check your internet connection and try reloading the page to reconnect to your feed.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
